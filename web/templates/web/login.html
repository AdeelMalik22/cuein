{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Cuein</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'web/app.css' %}">
  <script src="{% static 'web/app.js' %}" defer></script>
</head>
<body class="auth-body auth-login-body">
  <main class="login-wrap">
    <a class="wordmark" href="{% url 'web:landing' %}"><span>c</span>uein</a>
    <section class="auth-card login-card">
      <div class="auth-card-heading"><p class="eyebrow">WELCOME BACK</p><h1>What needs a nudge today?</h1><p>Sign in to your Cuein workspace.</p></div>
      <form method="post" class="auth-form auth-form-single">
        {% csrf_token %}
        <label class="field field-wide"><span>Username</span><input type="text" name="username" autocomplete="username" autofocus required{% if form.errors %} aria-invalid="true" aria-describedby="login-credentials-error"{% endif %}></label>
        <div class="field field-wide">
          <label for="login-password">Password</label>
          <span class="password-input">
            <input id="login-password" type="password" name="password" autocomplete="current-password" required{% if form.errors %} aria-invalid="true" aria-describedby="login-credentials-error"{% endif %}>
            <button class="password-toggle" type="button" data-password-toggle aria-controls="login-password" aria-label="Show password" aria-pressed="false">
              <svg data-password-icon="show" aria-hidden="true" viewBox="0 0 24 24"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6S2.5 12 2.5 12Z"></path><circle cx="12" cy="12" r="2.7"></circle></svg>
              <svg data-password-icon="hide" aria-hidden="true" viewBox="0 0 24 24"><path d="m3 3 18 18"></path><path d="M10.6 6.15A10.67 10.67 0 0 1 12 6c6 0 9.5 6 9.5 6a15.1 15.1 0 0 1-2.24 3.08"></path><path d="M16.12 17.12A10.4 10.4 0 0 1 12 18c-6 0-9.5-6-9.5-6a15.1 15.1 0 0 1 3.23-3.88"></path><path d="M9.88 9.88a3 3 0 0 0 4.24 4.24"></path></svg>
            </button>
          </span>
          {% if form.errors %}<p id="login-credentials-error" class="form-error login-credentials-error" role="alert">That username or password doesn’t match. Check both and try again.</p>{% endif %}
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button class="button button-dark field-wide" type="submit">Sign in <span aria-hidden="true">→</span></button>
      </form>
      <p class="auth-switch">New here? <a href="{% url 'web:signup' %}">Register your business</a></p>
    </section>
  </main>
</body>
</html>
