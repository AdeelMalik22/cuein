x-app: &app
  build:
    context: .
  image: cuein:local
  env_file:
    - .env
  environment:
    POSTGRES_HOST: db
    POSTGRES_PORT: '5432'
    CELERY_BROKER_URL: redis://valkey:6379/0
    CELERY_RESULT_BACKEND: redis://valkey:6379/0
    REDIS_CACHE_URL: redis://valkey:6379/1

services:
  db:
    image: postgres:16.14-alpine3.23
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Copy .env.example to .env and set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?Copy .env.example to .env and set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Copy .env.example to .env and set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8.1.8-alpine3.23
    command: ['valkey-server', '--appendonly', 'yes']
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  migrate:
    <<: *app
    command:
      - sh
      - -c
      - python manage.py migrate --noinput && python manage.py collectstatic --noinput
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - static_data:/app/staticfiles
    restart: 'no'

  web:
    <<: *app
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - '127.0.0.1:8000:8000'
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    restart: unless-stopped

  worker:
    <<: *app
    command: ['celery', '-A', 'cuein', 'worker', '--loglevel=INFO']
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  beat:
    <<: *app
    command: ['celery', '-A', 'cuein', 'beat', '--loglevel=INFO']
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  valkey_data:
  static_data:
  media_data:
